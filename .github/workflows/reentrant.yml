name: ISR Safety

# This workflow doubles as (a) a live dogfooding check that the Action's
# mechanics work on every push — install, run, SARIF upload — and (b) a
# copy-pasteable template for real firmware repos (see the README's
# GitHub Actions section for the version meant to be copied).
#
# It does NOT fail the build here: this repo has no real firmware to
# protect, and tests/corpus/*.c contains deliberately-buggy fixtures used
# by the test suite. Reentrant correctly finds them every time, which
# would otherwise make this check permanently, misleadingly red. A real
# firmware repo copying this workflow should keep the fail-on-findings
# step from the README's template — it's removed only here.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  analyze:
    name: Reentrant ISR-safety analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required for SARIF upload (free for public repos)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — required for --diff-base to resolve the base ref

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install reentrant
        run: pip install reentrant

      - name: Run ISR safety analysis
        # Findings here are almost certainly tests/corpus/*.c fixtures, not
        # real bugs — informational only, does not fail the build.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF_ARGS="--diff-base origin/${{ github.base_ref }}"
          else
            DIFF_ARGS=""
          fi
          reentrant analyze . --sarif --no-explain $DIFF_ARGS > reentrant.sarif || true

      - name: Upload to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reentrant.sarif
          # Shown as the tool name in the Security tab
          category: reentrant
